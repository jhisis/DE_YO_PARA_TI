<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Para ti con cariño 💙</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="center">
    <h1 id="title">Para ti 💙</h1>
    <p id="subtitle">Feliz Día del Hombre Mi Corazon</p>
  </header>

  <main>
    <section id="hero" class="card center">
      <p>Hice esto con mucho amor para ti.</p>
      <button id="openLetterBtn">Abrir la carta</button>
    </section>

    <section id="letter" class="card hidden">
      <h2>Nuestra carta</h2>
      <div id="letterContent"></div>
    </section>
  </main>

  <footer class="center">
    <small>Hecho con amor por tu India</small>
  </footer>

  <script src="script.js"></script>
</body>
</html>
